<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Netwerkgesprek generator</title>
    <style>
        :root {
            color-scheme: light;
            --background: #f3f6fb;
            --surface: #ffffff;
            --surface-muted: #f8fafd;
            --text: #1f2937;
            --text-muted: #4b5563;
            --border: #d5deeb;
            --border-focus: #3b82f6;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #eaf1ff 0%, var(--background) 40%, #edf2f8 100%);
            color: var(--text);
            line-height: 1.5;
        }

        .page {
            max-width: 860px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid #e3e9f3;
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 28px 32px 18px;
            background: linear-gradient(135deg, #0f3b8c 0%, #1e4fa8 100%);
            color: #fff;
        }

        .card-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .card-header p {
            margin: 8px 0 0;
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.95rem;
        }

        form {
            padding: 24px 32px 32px;
            display: grid;
            gap: 22px;
        }

        section {
            background: var(--surface-muted);
            border: 1px solid #e4ebf5;
            border-radius: var(--radius);
            padding: 18px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 1rem;
            color: #0f2a5c;
        }

        .field-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full-width {
            grid-column: 1 / -1;
        }

        label,
        legend {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            color: var(--text);
            font-size: 0.95rem;
            padding: 10px 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
        }

        fieldset {
            margin: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            background: #fff;
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .radio-option {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .radio-option input {
            width: auto;
            margin: 0;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        button {
            border: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, #1f5fce 0%, #2147a8 100%);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 11px 18px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(31, 95, 206, 0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(31, 95, 206, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .page {
                margin: 18px auto;
                padding: 0 12px;
            }

            .card-header,
            form {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <article class="card">
        <header class="card-header">
            <h1>Netwerkgesprek generator</h1>
            <p>Vul onderstaande gegevens in om direct een netwerkgesprek-verslag te genereren.</p>
        </header>

        <form>
            <section>
                <h2>Persoonlijke gegevens</h2>
                <div class="field-grid">
                    <div class="field">
                        <label for="name">Voorletters en naam</label>
                        <input id="name" placeholder="Voorletters en naam"/>
                    </div>

                    <div class="field">
                        <label for="birthDate">Geboortedatum</label>
                        <input id="birthDate" placeholder="Geboortedatum"/>
                    </div>
                </div>
            </section>

            <section>
                <h2>Netwerkgesprek gegevens</h2>
                <div class="field-grid">
                    <div class="field">
                        <label for="meetingDate">Datum netwerkgesprek</label>
                        <input id="meetingDate" placeholder="Datum netwerkgesprek"/>
                    </div>

                    <div class="field">
                        <label for="contactPersonName">Naam met wie het gesprek heeft plaatsgevonden</label>
                        <input id="contactPersonName" placeholder="Naam met wie het gesprek heeft plaatsgevonden"/>
                    </div>

                    <div class="field">
                        <label for="contactPersonCompany">Naam van het bedrijf waar de contactpersoon werkzaam is</label>
                        <input id="contactPersonCompany" placeholder="Naam van het bedrijf waar de contactpersoon werkzaam is"/>
                    </div>

                    <div class="field">
                        <label for="contactPersonSector">Sector waarin de contactpersoon werkzaam is</label>
                        <input id="contactPersonSector" placeholder="Sector waarin de contactpersoon werkzaam is"/>
                    </div>

                    <div class="field full-width">
                        <label for="meetingObjective">Wat was het doel van het gesprek</label>
                        <input id="meetingObjective" placeholder="Wat was het doel van het gesprek"/>
                    </div>

                    <div class="field full-width">
                        <fieldset>
                            <legend>Is dit doel behaald</legend>
                            <label class="radio-option">
                                <input type="radio" name="meetingObjectiveReachedChoice" value="Keuze1" checked/>
                                Ja
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="meetingObjectiveReachedChoice" value="Keuze2"/>
                                Nee
                            </label>
                        </fieldset>
                    </div>

                    <div class="field full-width">
                        <label for="meetingObjectiveReachedExplanation">Waarom wel/niet</label>
                        <input id="meetingObjectiveReachedExplanation" placeholder="Waarom wel/niet"/>
                    </div>

                    <div class="field full-width">
                        <label for="extraRemark">Eventuele aanvullende informatie m.b.t. het netwerkgesprek</label>
                        <textarea id="extraRemark"
                                  placeholder="Eventuele aanvullende informatie m.b.t. het netwerkgesprek"></textarea>
                    </div>
                </div>
            </section>

            <div class="actions">
                <button id="generateButton" type="button">Genereer</button>
            </div>
        </form>
    </article>
</main>

<script type="module" src="src/main.ts"></script>

</body>
</html>
